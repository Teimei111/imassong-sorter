<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アイマス楽曲ソート</title>
    <style>
        body {
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            text-align: center;
            background-color: #f4f7f8;
            color: #333;
            padding: 20px;
        }
        h1 { font-size: 1.5rem; color: #ff007f; }
        
        #sorter-ui {
            margin: 20px auto;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        #counter { margin-bottom: 10px; font-weight: bold; }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        button {
            padding: 15px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            transition: background 0.3s, transform 0.1s;
        }
        button:hover { background-color: #0056b3; }
        button:active { transform: scale(0.98); }
        
        #middle-btn { background-color: #6c757d; }
        #middle-btn:hover { background-color: #5a6268; }

        /* 進捗バー */
        #progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 10px;
            margin: 20px 0;
            height: 10px;
            overflow: hidden;
        }
        #progress {
            width: 0%;
            height: 100%;
            background-color: #ff007f;
            transition: width 0.3s;
        }

        /* 結果表示 */
        #result-list {
            display: none;
            text-align: left;
            max-width: 600px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 15px;
        }
        ul { list-style: none; padding: 0; }
        li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }
        .rank {
            font-weight: bold;
            color: #ff007f;
            margin-right: 10px;
            display: inline-block;
            width: 50px;
        }
    </style>
</head>
<body>

    <h1>アイマス楽曲ソート</h1>

    <!-- ソート操作エリア -->
    <div id="sorter-ui">
        <div id="counter">読み込み中...</div>
        
        <div id="progress-container">
            <div id="progress"></div>
        </div>

        <div class="button-container">
            <button id="left-btn" onclick="sortClick(-1)">左を選択</button>
            <button id="middle-btn" onclick="sortClick(0)">引き分け</button>
            <button id="right-btn" onclick="sortClick(1)">右を選択</button>
        </div>
    </div>

    <!-- 結果表示エリア -->
    <div id="result-list">
        <h2>ソート結果</h2>
        <div id="ranking"></div>
    </div>

    <!-- 末尾に ?v=1 などをつけると、ブラウザは「新しいファイルだ！」と認識します -->
    <script src="script.js?v=20260504_1"></script>

</body>
</html>
